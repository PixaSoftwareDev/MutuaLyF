version: "3.9"

# Dev overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:

  # Expose backend directly for local curl / Postman
  backend:
    ports:
      - "127.0.0.1:8000:8000"
    # Inline entrypoint so CRLF en Windows no rompe el script
    entrypoint: ["sh", "-c", "python -m alembic -c db/alembic.ini upgrade head && exec uvicorn main:app --host 0.0.0.0 --port 8000 --reload"]
    command: []
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG

  # Expose frontend directly
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  celery_worker:
    entrypoint: ["sh", "-c", "exec celery -A workers.celery_app worker --loglevel=debug --concurrency=1 -Q ingest,clustering,training,default"]
    command: []

  celery_beat:
    entrypoint: ["sh", "-c", "exec celery -A workers.celery_app beat --loglevel=info"]
    command: []

  # Use HTTP-only nginx in dev (no certs needed)
  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    # Remove the 443 port binding from prod config
    # (override replaces the entire ports list)

  # Grafana accesible directamente en dev
  grafana:
    ports:
      - "127.0.0.1:3001:3000"

  # Skip pgbackrest en dev
  pgbackrest:
    profiles:
      - backup
