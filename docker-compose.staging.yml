# Staging overlay — ambiente de prueba en el mismo VPS que producción.
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.staging.yml up -d \
#     backend_staging celery_staging frontend_staging nginx
#
# Acceso (SSH tunnel):
#   ssh -L 8080:127.0.0.1:8080 root@<vps> -p 2251
#   luego http://localhost:8080 en el browser
#
# Compartido con producción (no se duplica):
#   PostgreSQL, Qdrant, Redis, Neo4j, MinIO, modelos ML (models_data volume)
#
# Tenant de staging: "staging" — provisionar una sola vez con:
#   docker exec ia_backend_staging python provision_tenant.py \
#     --id staging --name "Staging" --plan professional \
#     --admin-email staging@interno.local --admin-password StagingPass123!

services:

  # ── Backend staging ──────────────────────────────────────────────────────────
  backend_staging:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ia_backend:latest
    container_name: ia_backend_staging
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
    env_file: .env
    environment:
      - ENVIRONMENT=staging
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend:/app
      - models_data:/root/.cache/huggingface
      - uploads_data_staging:/tmp/ia_ingest
      - branding_data_staging:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Celery staging ───────────────────────────────────────────────────────────
  celery_staging:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ia_backend:latest
    container_name: ia_celery_staging
    restart: unless-stopped
    command: celery -A workers.celery_app worker --loglevel=info --pool=solo -Q ingest,clustering,training,default --concurrency=1
    env_file: .env
    environment:
      - ENVIRONMENT=staging
    volumes:
      - ./backend:/app
      - models_data:/root/.cache/huggingface
      - uploads_data_staging:/tmp/ia_ingest
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Frontend staging ─────────────────────────────────────────────────────────
  frontend_staging:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=
    image: ia_frontend:latest
    container_name: ia_frontend_staging
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=
      - PORT=3000
      - HOSTNAME=0.0.0.0
    command: []
    volumes: []
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # ── Nginx — expone puerto 8080 para staging ──────────────────────────────────
  # docker compose ports son aditivos en overrides: 8080 se agrega a 80/443
  nginx:
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro

volumes:
  uploads_data_staging:
  branding_data_staging:
