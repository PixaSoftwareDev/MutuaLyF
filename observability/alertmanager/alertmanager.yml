global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by: ["alertname", "severity"]
  group_wait: 30s        # primer batch tras 30s — agrupa alertas en lote inicial
  group_interval: 5m     # 5 min entre batches de la misma agrupacion
  repeat_interval: 4h    # re-notifica una alerta resolviendo cada 4h si sigue activa

# Inhibición: si la plataforma entera está caída, no spammear con cada subcausa.
inhibit_rules:
  - source_matchers: [alertname="PlatformDown"]
    target_matchers: [severity="warning"]
    equal: ["alertname"]

receivers:
  - name: telegram
    telegram_configs:
      - bot_token_file: /etc/alertmanager/telegram_token
        chat_id: TELEGRAM_CHAT_ID_PLACEHOLDER
        parse_mode: HTML
        send_resolved: true
        message: |
          {{ if eq .Status "firing" }}🚨 <b>ALERTA</b>{{ else }}✅ <b>RESUELTA</b>{{ end }}
          <b>{{ .CommonLabels.alertname }}</b> ({{ .CommonLabels.severity }})

          {{ range .Alerts -}}
          {{ .Annotations.summary }}
          <i>{{ .Annotations.description }}</i>
          {{ end }}
