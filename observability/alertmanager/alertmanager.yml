global:
  resolve_timeout: 5m

# El default es 'null' (no-op) para que Alertmanager pueda arrancar sin que el
# operador haya completado el setup de Telegram. Cuando esté listo: comentar
# 'receiver: null' y descomentar 'receiver: telegram' + completar chat_id.
route:
  receiver: "null"
  # receiver: telegram      # ← Descomentar después de configurar telegram_token + chat_id
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

inhibit_rules:
  - source_matchers: [alertname="PlatformDown"]
    target_matchers: [severity="warning"]
    equal: ["alertname"]

receivers:
  # Receiver vacío — Alertmanager loguea las alertas pero no las despacha.
  # Suficiente para arrancar sin tener Telegram listo aún.
  - name: "null"

  # Activar editando este bloque y cambiando 'route.receiver' arriba.
