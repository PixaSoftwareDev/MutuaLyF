worker_processes 1;
error_log /var/log/nginx/error.log warn;

events { worker_connections 256; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 200M;

  # Use Docker's internal DNS so nginx re-resolves hostnames on each request
  # instead of caching the IP at startup (avoids 502 after container restarts)
  resolver 127.0.0.11 valid=5s ipv6=off;

  server {
    listen 80;
    server_name _;

    set $backend_host  backend:8000;
    set $frontend_host frontend:3000;

    location /api/ {
      proxy_pass         http://$backend_host;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 60s;
    }

    location /health {
      proxy_pass       http://$backend_host;
      proxy_set_header Host $host;
    }

    location /docs {
      proxy_pass       http://$backend_host;
      proxy_set_header Host $host;
    }

    location /openapi.json {
      proxy_pass       http://$backend_host;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass         http://$frontend_host;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_read_timeout 30s;
    }
  }
}
