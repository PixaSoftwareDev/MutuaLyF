worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" tenant="$http_x_tenant_id"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 200M;

    # ── Security headers ──────────────────────────────────────────────────────
    # Aplicados a TODAS las responses (HTTP y HTTPS). `always` los emite incluso
    # en errores (4xx/5xx) — sin esto un 500 podia exponer detalles sin proteccion.
    add_header X-Frame-Options             "DENY" always;
    add_header X-Content-Type-Options      "nosniff" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "geolocation=(), microphone=(), camera=()" always;
    # HSTS solo via HTTPS — preload no incluido hasta tener dominio real.
    add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
    # CSP relajada para Next.js (que necesita 'unsafe-inline' por hidratacion).
    # Endurecerla cuando se migre a nonces.
    add_header Content-Security-Policy     "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # F1.4-6: subido de 60r/m → 600r/m por tenant y 120r/m → 1200r/m por IP.
    # Los viejos eran absurdamente bajos para uso real (1 panel admin con polling
    # ya pasaba de 20r/m por si solo).
    limit_req_zone $http_x_tenant_id zone=per_tenant:10m rate=600r/m;
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=1200r/m;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── Servidor HTTP — redirige a HTTPS + sirve ACME challenge ────────────────
    # Let's Encrypt valida el dominio via HTTP-01: pide un archivo en
    # /.well-known/acme-challenge/<token>. Mantenemos ese path en HTTP plano
    # (no redirige), todo lo demas redirige a HTTPS.
    server {
        listen 80;
        listen [::]:80;
        server_name intellix.com.ar www.intellix.com.ar;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Servidor HTTPS — cert real de Let's Encrypt ─────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name intellix.com.ar www.intellix.com.ar;

        ssl_certificate     /etc/letsencrypt/live/intellix.com.ar/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/intellix.com.ar/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        set $tenant_id "mutual";

        # Login: nunca inyectar X-Tenant-ID (super-admin puede loguearse sin tenant)
        location = /api/v1/auth/login {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_connect_timeout 5s;
        }

        # SSE — sin buffering, timeout largo
        location = /api/v1/operator/events {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 3600s;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_set_header   Connection "";
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        location /api/ {
            # F1.4-6: burst 20/40 → 100/200. Tolera picos de stress/tests sin tirar 429.
            limit_req zone=per_tenant burst=100 nodelay;
            limit_req zone=per_ip burst=200 nodelay;

            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_connect_timeout 5s;
            client_body_timeout 180s;
            client_max_body_size 200M;
        }

        location /health {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
        }

        location /metrics {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
        }

        location /uploads/ {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_read_timeout 60s;
            add_header         Cache-Control "public, max-age=604800, immutable";
        }

        # Frontend Next.js
        location / {
            set $frontend_host frontend:3000;
            proxy_pass         http://$frontend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
