worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" tenant="$http_x_tenant_id"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 200M;

    limit_req_zone $http_x_tenant_id zone=per_tenant:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=120r/m;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── Servidor HTTP + HTTPS (sin dominio, cert autofirmado) ─────────────────
    # Tenant hardcodeado a "mutual" mientras no haya subdominios.
    # Cuando haya dominio real: reemplazar por cert Let's Encrypt y subdominio routing.
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        set $tenant_id "mutual";

        # Login: nunca inyectar X-Tenant-ID (super-admin puede loguearse sin tenant)
        location = /api/v1/auth/login {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_connect_timeout 5s;
        }

        # SSE — sin buffering, timeout largo
        location = /api/v1/operator/events {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 3600s;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_set_header   Connection "";
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        location /api/ {
            limit_req zone=per_tenant burst=20 nodelay;
            limit_req zone=per_ip burst=40 nodelay;

            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_connect_timeout 5s;
            client_body_timeout 180s;
            client_max_body_size 200M;
        }

        location /health {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
        }

        location /metrics {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
        }

        location /uploads/ {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_read_timeout 60s;
            add_header         Cache-Control "public, max-age=604800, immutable";
        }

        # Frontend Next.js
        location / {
            set $frontend_host frontend:3000;
            proxy_pass         http://$frontend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
