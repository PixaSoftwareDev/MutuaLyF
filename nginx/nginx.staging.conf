worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" tenant="$http_x_tenant_id" env="$http_x_env"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 200M;

    add_header X-Frame-Options             "DENY" always;
    add_header X-Content-Type-Options      "nosniff" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy     "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    limit_req_zone $http_x_tenant_id zone=per_tenant:10m rate=600r/m;
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=1200r/m;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ══════════════════════════════════════════════════════════════════════════
    # PRODUCCIÓN — puerto 80 / 443
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        set $tenant_id "mutual";

        location = /api/v1/auth/login {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_connect_timeout 5s;
        }

        location = /api/v1/operator/events {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 3600s;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_set_header   Connection "";
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        location /api/ {
            limit_req zone=per_tenant burst=100 nodelay;
            limit_req zone=per_ip burst=200 nodelay;
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_connect_timeout 5s;
            client_body_timeout 180s;
            client_max_body_size 200M;
        }

        location /health {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
        }

        location /metrics {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
        }

        location /uploads/ {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_read_timeout 60s;
            add_header         Cache-Control "public, max-age=604800, immutable";
        }

        location / {
            set $frontend_host frontend:3000;
            proxy_pass         http://$frontend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # STAGING — puerto 8080 (solo loopback, acceso via SSH tunnel)
    #
    # Acceso: ssh -L 8080:127.0.0.1:8080 root@<vps> -p 2251
    #         luego http://localhost:8080
    #
    # Tenant hardcodeado a "staging". Provisionar una vez con deploy-staging.sh.
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 8080;
        server_name _;

        set $tenant_id "staging";

        location = /api/v1/auth/login {
            set $backend_host backend_staging:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_connect_timeout 5s;
        }

        location = /api/v1/operator/events {
            set $backend_host backend_staging:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 3600s;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_set_header   Connection "";
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        location /api/ {
            set $backend_host backend_staging:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_connect_timeout 5s;
            client_body_timeout 180s;
            client_max_body_size 200M;
        }

        location /health {
            set $backend_host backend_staging:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
        }

        location / {
            set $frontend_host frontend_staging:3000;
            proxy_pass         http://$frontend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 60s;
            # Staging: nunca cachear en browser para ver cambios al instante
            add_header         Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header         Pragma "no-cache" always;
            expires            0;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # PRODUCCIÓN BACKEND + TENANT STAGING — puerto 8081
    # Mismo tenant staging, mismo documento — pero procesado por el backend
    # de producción (4 workers, 14GB). Permite comparar staging vs prod backend.
    #
    # Acceso: ssh -L 8081:127.0.0.1:8081 root@<vps> -p 2251
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 8081;
        server_name _;

        set $tenant_id "staging";

        location = /api/v1/auth/login {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_connect_timeout 5s;
        }

        location /api/ {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_connect_timeout 5s;
            client_body_timeout 180s;
            client_max_body_size 200M;
        }

        location /health {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
        }
    }
}
