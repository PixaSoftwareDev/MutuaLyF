worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" tenant="$http_x_tenant_id"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 200M;  # Enterprise plan max doc size

    # ── Rate limiting zones (by tenant header or IP) ───────────────────────────
    limit_req_zone $http_x_tenant_id zone=per_tenant:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=120r/m;

    # Docker's internal DNS — re-resolve every 30s so container restarts don't break routing
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Backend upstream ───────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ── Frontend upstream ──────────────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── Dev server: localhost sin subdominio (tenant "demo" hardcodeado) ─────────
    # Permite acceder desde http://localhost sin certificado SSL.
    # Solo para desarrollo local — en producción usar HTTPS con subdominio.
    server {
        listen 80;
        server_name localhost;

        set $tenant_id "demo";

        # Login endpoint: never inject X-Tenant-ID so super-admin login works
        location = /api/v1/auth/login {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
            client_max_body_size 200M;
        }

        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /metrics {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 30s;
        }
    }

    # ── HTTP redirect (resto de dominios → HTTPS) ─────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name ~^(?<tenant>[^.]+)\.(.+)$;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Propagate tenant subdomain as header for the tenant middleware
        set $tenant_id $tenant;

        # ── API routes → backend ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=per_tenant burst=20 nodelay;
            limit_req zone=per_ip burst=40 nodelay;

            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ── Health check (no rate limiting) ──────────────────────────────────
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Frontend → Next.js ────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }
}
