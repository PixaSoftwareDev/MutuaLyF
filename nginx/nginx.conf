worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" tenant="$http_x_tenant_id"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 200M;  # Enterprise plan max doc size

    # ── Rate limiting zones (by tenant header or IP) ───────────────────────────
    # F1.4-6: subido de 60r/m → 600r/m por tenant (10 req/s) y 120r/m → 1200r/m
    # por IP (20 req/s). Los limites viejos eran absurdamente bajos para tests
    # de stress y uso real (un panel admin abierto con polling hacia 20+ r/m solo).
    limit_req_zone $http_x_tenant_id zone=per_tenant:10m rate=600r/m;
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=1200r/m;

    # Docker's internal DNS — re-resolve every 10s so container restarts don't break routing.
    # K1 fix: with a static `upstream backend { server backend:8000; }` nginx caches the IP at
    # startup and 502's after every backend restart. Using a variable in proxy_pass forces
    # nginx to re-resolve via this resolver on each request.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Default service map. Each location uses `set $backend_host backend:8000;` (or frontend)
    # right before proxy_pass so DNS is re-resolved through the resolver above.
    map $host $unused { default 0; }

    # ── Dev/IP server: localhost y acceso por IP directa ─────────────────────────
    # Cubre desarrollo local (localhost) y VPS sin dominio (IP directa).
    # tenant_id "demo" es el hardcodeado para acceso sin subdominio.
    server {
        listen 80;
        listen 443 ssl;
        server_name localhost 200.58.109.110;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        set $tenant_id "demo";

        # Login endpoint: never inject X-Tenant-ID so super-admin login works
        location = /api/v1/auth/login {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_connect_timeout 5s;
        }

        # SSE — disable buffering, long timeout
        location = /api/v1/operator/events {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 3600s;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_set_header   Connection "";
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        location /api/ {
            # K12 fix: 30s cortaba ingestas largas (60-90s) aunque el backend siguiera procesando.
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_connect_timeout 5s;
            client_body_timeout 180s;
            client_max_body_size 200M;
        }

        location /health {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
        }

        location /metrics {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
        }

        # Tenant uploads (logos, favicons) served by backend's StaticFiles
        location /uploads/ {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_read_timeout 60s;
            # Aggressive caching: filename includes a hash so changes bust cache naturally
            add_header         Cache-Control "public, max-age=604800, immutable";
        }

        location / {
            set $frontend_host frontend:3000;
            proxy_pass         http://$frontend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }

    # ── HTTP redirect (dominios con subdominio → HTTPS) ──────────────────────────
    # Solo aplica a dominios reales; localhost y la IP directa tienen su propio bloque.
    server {
        listen 80;
        server_name ~^(?<tenant>[^.]+)\.(.+)$;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name ~^(?<tenant>[^.]+)\.(.+)$;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Propagate tenant subdomain as header for the tenant middleware
        set $tenant_id $tenant;

        # ── API routes → backend ──────────────────────────────────────────────
        location /api/ {
            # F1.4-6: burst 20/40 → 100/200. Aguanta picos de tests de stress
            # sin tirar 429 (con rate base de 600/1200 r/m, el burst absorbe
            # ráfagas de hasta 100 requests por tenant antes de empezar a 429).
            limit_req zone=per_tenant burst=100 nodelay;
            limit_req zone=per_ip burst=200 nodelay;

            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_connect_timeout 5s;
            client_body_timeout 180s;
        }

        # ── Health check (no rate limiting) ──────────────────────────────────
        location /health {
            set $backend_host backend:8000;
            proxy_pass http://$backend_host;
            proxy_set_header Host $host;
        }

        # ── Tenant uploads (logos, favicons) ────────────────────────────────
        location /uploads/ {
            set $backend_host backend:8000;
            proxy_pass         http://$backend_host;
            proxy_set_header   Host $host;
            proxy_read_timeout 60s;
            add_header         Cache-Control "public, max-age=604800, immutable";
        }

        # ── Frontend → Next.js ────────────────────────────────────────────────
        location / {
            set $frontend_host frontend:3000;
            proxy_pass         http://$frontend_host;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
