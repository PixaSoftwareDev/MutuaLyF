version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─── Databases ────────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ia_postgres
    restart: unless-stopped
    # F1.8: max_connections subido de 100 (default) a 200. Necesario para
    # 4 workers uvicorn (4x30=120 pool) + celery + migraciones + admin tools.
    # 200 es conservador para los recursos del container (PG usa ~10MB por
    # connection idle), con 31G de RAM en VPS hay margen sobrado.
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - pgbackrest_data:/var/lib/pgbackrest
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  neo4j:
    image: neo4j:5.18-community
    container_name: ia_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/7474' 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: ia_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    networks:
      - internal
    # Qdrant abre 1 FD por segment + 1 por conexion HTTP. Con multiples
    # ingestas/re-ingestas + LRU cache de RocksDB, el default de 1024 FDs
    # del container Docker se queda corto y el server empieza a tirar
    # "Too many open files" → todas las queries timeoutean en 5s.
    # Subimos a 65536 (mismo orden que produccion estandar).
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: ia_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7.2-alpine
    container_name: ia_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Backend ──────────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ia_backend
    restart: unless-stopped
    # Modo producción: 4 workers en paralelo para soportar concurrencia real.
    # Con 1 worker, 20 chats simultáneos colapsan a 21s (audit 2026-05-22).
    # Con 4 workers + 12 CPU cap, 20 chats simultáneos → ~2-3s.
    # No --reload aca: causa zombies de healthcheck bajo stress. Dev usa override.
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level info --timeout-keep-alive 30 --timeout-graceful-shutdown 30
    env_file: .env
    environment:
      # F2 Opcion A: solo el reranker se mueve a TEI. Embeddings siguen via
      # OpenAI (text-embedding-3-small, ~80ms via API, sin GIL en uvicorn).
      # Si tei-reranker no arranca, el reranker se skipea y chunks se ordenan
      # por scores de Qdrant (degraded mode pero el bot sigue respondiendo).
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-tei}
      TEI_RERANKER_URL: ${TEI_RERANKER_URL:-http://tei-reranker:80}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - models_data:/root/.cache/huggingface
      - uploads_data:/tmp/ia_ingest
      - branding_data:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 180s
    logging: *default-logging
    # F1.2-3: subido de 6/10G → 12/14G. Cada worker uvicorn consume ~700MB
    # (modelos locales como fallback). Con 4 workers + TEI out-of-process,
    # el backend usa ~5GB. Margen para picos hasta 14G. CPU: 4 workers x 3
    # cores cada uno = 12 (de 16 disponibles en el VPS).
    mem_limit: 14g
    cpus: 12
    deploy:
      resources:
        limits:
          cpus: "12"
          memory: 14G

  # ─── F2: Text Embeddings Inference (TEI) — solo reranker ──────────────────
  #
  # Saca el reranker del proceso Python uvicorn. TEI corre bge-reranker-large
  # en Rust con dynamic batching: 20 requests simultaneas se procesan en 1
  # forward pass → throughput ~10x vs llamar al modelo en-proceso.
  #
  # NOTA: embeddings NO van por TEI sino por OpenAI (text-embedding-3-small,
  # ~80ms via API). OpenAI ya es async HTTP → no consume GIL del uvicorn,
  # no era cuello de botella. Mantenemos esa opcion estable para no
  # introducir un nuevo container de 4GB solo por ~50ms de ganancia.
  # Si en el futuro queremos sacar OpenAI: code TEI embeddings existe en
  # services/embeddings.py — solo cambiar EMBEDDING_PROVIDER=tei.
  #
  # El reranker SI era cuello critico: bge-reranker-large corria en uvicorn
  # con PyTorch + GIL + leak conocido de ~250MB/query. Eso es lo que se mueve.

  # Init container: pre-descarga el modelo del reranker antes de que TEI arranque.
  # TEI no maneja bien los redirects relativos que devuelve HF Hub → falla con
  # "relative URL without a base". huggingface-cli (Python) SI los maneja.
  # Una vez descargado el modelo, este container exitea y TEI lo usa del cache.
  tei-model-init:
    image: python:3.11-slim
    container_name: ia_tei_model_init
    restart: "no"
    volumes:
      - tei_data:/data
    environment:
      HF_HOME: /data
    networks:
      - internal
    command:
      - bash
      - -c
      - |
        set -e
        if [ -d /data/models--BAAI--bge-reranker-base ]; then
          echo "[init] modelo ya en cache, skipping download"
          exit 0
        fi
        echo "[init] instalando huggingface_hub..."
        pip install --quiet --no-cache-dir huggingface_hub
        echo "[init] descargando BAAI/bge-reranker-base (~600MB)..."
        # huggingface_hub >= 1.0 renombro el CLI a `hf` (antes huggingface-cli)
        hf download BAAI/bge-reranker-base --cache-dir /data
        echo "[init] download completo"
    logging: *default-logging

  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: ia_tei_reranker
    restart: unless-stopped
    depends_on:
      tei-model-init:
        condition: service_completed_successfully
    volumes:
      - tei_data:/data
    environment:
      HF_HOME: /data
    command:
      - --model-id=BAAI/bge-reranker-base
      - --max-concurrent-requests=128
      - --max-batch-tokens=16384
      - --port=80
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ia_celery_worker
    restart: unless-stopped
    command: celery -A workers.celery_app worker --loglevel=info --pool=solo -Q ingest,clustering,training,default
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - models_data:/root/.cache/huggingface
      - uploads_data:/tmp/ia_ingest
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 6G

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ia_celery_beat
    restart: unless-stopped
    command: celery -A workers.celery_app beat --loglevel=info
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=
    container_name: ia_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - internal
    depends_on:
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ─── Reverse proxy ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: ia_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
    logging: *default-logging

  # ─── Backup ───────────────────────────────────────────────────────────────────

  pgbackrest:
    image: woblerr/pgbackrest:2.51
    container_name: ia_pgbackrest
    restart: unless-stopped
    # In dev: stay alive as a sidecar so the volume mount persists.
    # In prod: replace with a cron schedule (e.g., daily full backup + WAL archiving).
    entrypoint: ["/bin/sh", "-c", "echo 'pgBackRest sidecar ready' && sleep infinity"]
    environment:
      PGBACKREST_STANZA: main
      PGBACKREST_PG1_PATH: /var/lib/postgresql/data
      PGBACKREST_REPO1_PATH: /var/lib/pgbackrest
      PGBACKREST_REPO1_RETENTION_FULL: 7
      PGBACKREST_LOG_LEVEL_CONSOLE: info
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      - pgbackrest_data:/var/lib/pgbackrest
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging

  # ─── Tracing ──────────────────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: ia_jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
    ports:
      - "127.0.0.1:16686:16686"   # Jaeger UI
      - "127.0.0.1:4317:4317"     # OTLP gRPC receiver
    networks:
      - internal
    logging: *default-logging

  # ─── Observabilidad ───────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ia_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - internal
    logging: *default-logging

  grafana:
    image: grafana/grafana:10.4.3
    container_name: ia_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - internal
    logging: *default-logging

  loki:
    image: grafana/loki:3.0.0
    container_name: ia_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - internal
    logging: *default-logging

  promtail:
    image: grafana/promtail:3.0.0
    container_name: ia_promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - internal
    logging: *default-logging

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: ia_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    networks:
      - internal
    logging: *default-logging

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: ia_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging

volumes:
  postgres_data:
  pgbackrest_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  redis_data:
  minio_data:
  models_data:
  tei_data:
  uploads_data:
  branding_data:
  prometheus_data:
  grafana_data:
  loki_data:
  frontend_nm:

networks:
  internal:
    driver: bridge
