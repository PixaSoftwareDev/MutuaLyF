version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─── Databases ────────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - pgbackrest_data:/var/lib/pgbackrest
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  neo4j:
    image: neo4j:5.18-community
    container_name: ia_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/7474' 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: ia_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7.2-alpine
    container_name: ia_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Backend ──────────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ia_backend
    restart: unless-stopped
    # Modo producción: 2 workers dedicados, sin --reload (que en stress causa
    # zombies de healthcheck y procesos sin worker).
    # Para hot-reload en desarrollo: agregar --reload manualmente y bajar workers a 1.
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1 --log-level info --timeout-keep-alive 30 --timeout-graceful-shutdown 30
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - models_data:/root/.cache/huggingface
      - uploads_data:/tmp/ia_ingest
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 180s
    logging: *default-logging
    # docker-compose standalone ignora deploy.resources.limits — usar atajos directos.
    # 10G RAM y 6 CPU. Subido de 6G a 10G tras descubrir leak ~250MB/query en
    # bge-reranker-large (PyTorch retiene state aún con torch.inference_mode + gc).
    # En VPS conviene 16G+. Con restart: unless-stopped + healthcheck holgado,
    # los OOM intermitentes se recuperan en ~60s sin intervención.
    mem_limit: 10g
    cpus: 6
    deploy:
      resources:
        limits:
          cpus: "6"
          memory: 10G

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ia_celery_worker
    restart: unless-stopped
    command: celery -A workers.celery_app worker --loglevel=info --pool=solo -Q ingest,clustering,training,default
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - models_data:/root/.cache/huggingface
      - uploads_data:/tmp/ia_ingest
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 6G

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ia_celery_beat
    restart: unless-stopped
    command: celery -A workers.celery_app beat --loglevel=info
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=
    container_name: ia_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - internal
    depends_on:
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ─── Reverse proxy ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: ia_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
    logging: *default-logging

  # ─── Backup ───────────────────────────────────────────────────────────────────

  pgbackrest:
    image: woblerr/pgbackrest:2.51
    container_name: ia_pgbackrest
    restart: unless-stopped
    # In dev: stay alive as a sidecar so the volume mount persists.
    # In prod: replace with a cron schedule (e.g., daily full backup + WAL archiving).
    entrypoint: ["/bin/sh", "-c", "echo 'pgBackRest sidecar ready' && sleep infinity"]
    environment:
      PGBACKREST_STANZA: main
      PGBACKREST_PG1_PATH: /var/lib/postgresql/data
      PGBACKREST_REPO1_PATH: /var/lib/pgbackrest
      PGBACKREST_REPO1_RETENTION_FULL: 7
      PGBACKREST_LOG_LEVEL_CONSOLE: info
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      - pgbackrest_data:/var/lib/pgbackrest
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging

  # ─── Tracing ──────────────────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: ia_jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
    ports:
      - "127.0.0.1:16686:16686"   # Jaeger UI
      - "127.0.0.1:4317:4317"     # OTLP gRPC receiver
    networks:
      - internal
    logging: *default-logging

  # ─── Observabilidad ───────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ia_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - internal
    logging: *default-logging

  grafana:
    image: grafana/grafana:10.4.3
    container_name: ia_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - internal
    logging: *default-logging

  loki:
    image: grafana/loki:3.0.0
    container_name: ia_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - internal
    logging: *default-logging

  promtail:
    image: grafana/promtail:3.0.0
    container_name: ia_promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - internal
    logging: *default-logging

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: ia_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    networks:
      - internal
    logging: *default-logging

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: ia_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging

volumes:
  postgres_data:
  pgbackrest_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  redis_data:
  models_data:
  uploads_data:
  prometheus_data:
  grafana_data:
  loki_data:
  frontend_nm:

networks:
  internal:
    driver: bridge
